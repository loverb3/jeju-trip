<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>제주 여행 지도 · 7/22~27</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
:root{
  --sea:#0E7C86; --tangerine:#E8762C; --latte:#8A6244; --basalt:#2E2A26;
  --sand:#FBF7EF; --stone:#8C857B; --navy:#33475B; --line:#E7DFD2;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:"Pretendard Variable",Pretendard,-apple-system,"Malgun Gothic",sans-serif;background:var(--sand);color:var(--basalt)}
header{position:sticky;top:0;z-index:800;padding:14px 16px 4px;background:var(--sand);border-bottom:1px solid var(--line);box-shadow:0 2px 8px rgba(60,50,40,.07)}
.title-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
h1{font-size:19px;font-weight:800;letter-spacing:-0.02em}
h1 .wave{color:var(--sea)}
.dates{font-size:12px;color:var(--stone);font-weight:600}
.searchbar{margin-top:10px;position:relative}
.searchbar input{width:100%;padding:10px 38px 10px 14px;border:1.5px solid var(--line);border-radius:12px;font-size:15px;background:#fff;outline:none;font-family:inherit}
.searchbar input:focus{border-color:var(--sea)}
.searchbar .clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:var(--line);color:var(--basalt);width:24px;height:24px;border-radius:50%;font-size:13px;cursor:pointer;display:none}
.chips{display:flex;gap:6px;padding:10px 0;overflow-x:auto;background:var(--sand);scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:7px 14px;border-radius:999px;border:1.5px solid var(--line);background:#fff;font-size:13.5px;font-weight:700;color:var(--stone);cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit}
.chip .dot{width:8px;height:8px;border-radius:50%}
.chip.active{color:#fff;border-color:transparent}
.chip.active[data-cat="all"]{background:var(--basalt)}
.chip.active[data-cat="go"]{background:var(--sea)}
.chip.active[data-cat="cafe"]{background:var(--latte)}
.chip.active[data-cat="food"]{background:var(--tangerine)}
.chip.active[data-cat="stay"]{background:var(--navy)}
.mapwrap{position:relative}
#map{height:48vh;min-height:300px;border-bottom:1px solid var(--line);z-index:0}
.listwrap{padding:6px 12px 46px;background:var(--sand)}
.group-label{font-size:12px;font-weight:800;color:var(--stone);letter-spacing:.08em;margin:14px 6px 6px;display:flex;align-items:center;gap:6px}
.group-label .dot{width:9px;height:9px;border-radius:50%}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px 14px;margin-bottom:8px;cursor:pointer;transition:transform .08s}
.card:active{transform:scale(.985)}
.card .nm{font-size:15px;font-weight:700;line-height:1.3}
.card .intro{font-size:12.5px;color:#5B554D;margin-top:3px;line-height:1.45}
.tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.tag{font-size:10.5px;font-weight:800;padding:2.5px 7px;border-radius:7px;background:#F1ECE2;color:#6B6459}
.tag.rain{background:#E8F1FB;color:#2E6DA4}
.tag.heat{background:#E6F5F0;color:#1C7A54}
.tag.sun{background:#FDEEE6;color:#C05B1D}
.tag.far{background:#FDECEC;color:#C0392B}
.tag.mid{background:#FFF4E4;color:#B96A12}
.tag.rsv{background:#EAF4F5;color:var(--sea)}
.tag.trip{background:#EDEAF6;color:#4C3E86}
#toMap{position:fixed;right:14px;bottom:18px;z-index:850;padding:11px 17px;border-radius:999px;border:none;background:var(--basalt);color:#fff;font-size:13px;font-weight:800;box-shadow:0 4px 12px rgba(0,0,0,.3);cursor:pointer;display:none;font-family:inherit}
.empty{color:var(--stone);text-align:center;padding:30px 0;font-size:14px}
.pin{width:26px;height:26px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2.5px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center}
.pin span{transform:rotate(45deg);font-size:12px}
.leaflet-popup-content-wrapper{border-radius:14px;font-family:inherit}
.leaflet-popup-content{margin:12px 14px;min-width:210px;max-width:250px}
.pp-nm{font-weight:800;font-size:15px;margin-bottom:3px;line-height:1.3}
.pp-intro{font-size:12.5px;color:#4C463E;line-height:1.5;margin-bottom:5px}
.pp-tip{font-size:12px;color:#8A5A17;background:#FBF3E2;border-radius:8px;padding:6px 8px;line-height:1.5;margin-bottom:7px}
.pp-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.pp-btns{display:flex;gap:5px;margin-bottom:5px}
.pp-btns a{flex:1;text-align:center;font-size:12px;font-weight:800;text-decoration:none;padding:7px 0;border-radius:9px;color:#fff}
.kakao{background:#F7C600;color:#3A2900!important}
.naver{background:#03C75A}
.goog{background:#4285F4}
.blog{background:#5A9E6F}
.yt{background:#E14B4B}
footer{font-size:11px;color:var(--stone);text-align:center;padding:8px 12px 16px;background:var(--sand);line-height:1.6}
</style>
</head>
<body>
<header>
  <div class="title-row"><h1>제주 여행 지도 <span class="wave">〜</span></h1><span class="dates">2026. 7. 22 – 27 · 두가족 8명</span></div>
  <div class="searchbar">
    <input id="q" type="search" placeholder="장소 검색 (예: 비자림, 치저스)" autocomplete="off">

</header>

<div class="listwrap" id="list"></div>
<button id="toMap">▲ 지도</button>
<footer>핀·목록 터치 → 위치 이동 · 팝업에서 내비(카카오/네이버/구글)·후기(블로그/유튜브) 연결<br>날씨태그: 🌧️ 비와도 좋음 · ☀️ 더위에 좋음 · 🥵 한낮 피하기<br>장소 추가·수정 요청은 아빠(총무)에게 → 잠시 후 새로고침하면 반영됩니다 · 정보 기준: 2026. 7.</footer>

let map, curCat='all', curQ='';
const listEl = document.getElementById('list');
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function tagHtml(p){
  let h='';
  (p.w||[]).forEach(k=>{const t=WTAG[k]; if(t) h+=`<span class="tag ${t.cls}">${t.txt}</span>`;});
  if(p.dist==='far') h+='<span class="tag far">🚗 원거리 1h+ · 비권장</span>';
  else if(p.dist==='trip') h+='<span class="tag trip">🚗 원정 코스 1h</span>';
  else if(p.dist==='mid') h+='<span class="tag mid">🚗 30~40분</span>';
  if((p.tip||'').includes('예약제')) h+='<span class="tag rsv">📞 예약제</span>';
  return h;
}

function popupHtml(p){
  const c = CATS[p.cat];
  const nmClean = p.nm.replace(/\s*\(.*?\)\s*/g,' ').trim();
  const nmEnc = encodeURIComponent(nmClean);
  const blogQ = encodeURIComponent(nmClean+' 제주');
  let h = `<div class="pp-nm">${c.emoji} ${esc(p.nm)}</div>`;
  if(p.intro) h += `<div class="pp-intro">${esc(p.intro)}</div>`;
  if(p.tip)   h += `<div class="pp-tip">💡 ${esc(p.tip)}</div>`;
  h += `<div class="pp-tags">${tagHtml(p)}</div>`;
  h += `<div class="pp-btns">
      <a class="kakao" target="_blank" href="https://map.kakao.com/link/to/${nmEnc},${p.lat},${p.lng}">카카오맵</a>
      <a class="naver" target="_blank" href="https://map.naver.com/p/search/${nmEnc}">네이버</a>
      <a class="goog" target="_blank" href="https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}">구글</a>
    </div>
    <div class="pp-btns">
      <a class="blog" target="_blank" href="https://search.naver.com/search.naver?ssc=tab.blog.all&query=${blogQ}">📝 블로그 후기</a>
      <a class="yt" target="_blank" href="https://www.youtube.com/results?search_query=${blogQ}">▶ 유튜브</a>
    </div>`;
  return h;
}

function makeMarker(p){
  const c = CATS[p.cat];
  const icon = L.divIcon({className:'',
    html:`<div class="pin" style="background:${c.color}"><span>${c.emoji}</span></div>`,
    iconSize:[26,26],iconAnchor:[13,26],popupAnchor:[0,-26]});
  return L.marker([p.lat,p.lng],{icon}).bindPopup(()=>popupHtml(p),{closeButton:true,maxWidth:270});
}

function matches(p){
  const okCat = (curCat==='all' || p.cat===curCat);
  const blob = (p.nm+' '+(p.intro||'')+' '+(p.tip||'')).toLowerCase();
  return okCat && (!curQ || blob.includes(curQ));
}

function render(){
  BASE.forEach(p=>{
    if(!p.marker) p.marker = makeMarker(p);
    const on = matches(p);
    if(on && !map.hasLayer(p.marker)) p.marker.addTo(map);
    if(!on && map.hasLayer(p.marker)) map.removeLayer(p.marker);
  });
  let html='';
  ['go','cafe','food','stay'].forEach(cat=>{
    const items = BASE.filter(p=>p.cat===cat && matches(p));
    if(!items.length) return;
    const c=CATS[cat];
    html+=`<div class="group-label"><span class="dot" style="background:${c.color}"></span>${c.label} · ${items.length}곳</div>`;
    items.forEach(p=>{
      html+=`<div class="card" onclick="goTo('${p.id}')">
        <div class="nm">${esc(p.nm)}</div><div class="intro">${esc(p.intro||'')}</div>
        <div class="tags">${tagHtml(p)}</div>
      </div>`;
    });
  });
  listEl.innerHTML = html || '<div class="empty">검색 결과가 없습니다</div>';
  const vis = BASE.filter(matches);
  if(vis.length && (curCat!=='all' || curQ)){
    map.fitBounds(L.latLngBounds(vis.map(p=>[p.lat,p.lng])).pad(0.18));
  }
}

function scrollToMap(){
  const el = document.querySelector('.mapwrap');
  const h = document.querySelector('header').offsetHeight;
  window.scrollTo({top: el.getBoundingClientRect().top + window.scrollY - h, behavior:'smooth'});
}
window.goTo = function(id){
  const p = BASE.find(x=>x.id===id); if(!p) return;
  scrollToMap();
  map.flyTo([p.lat,p.lng], 15, {duration:.6});
  setTimeout(()=>p.marker.openPopup(), 700);
};

BASE.forEach((p,i)=>p.id='b'+i);
map = L.map('map').setView([33.47,126.72],11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map);

document.getElementById('chips').addEventListener('click', e=>{
  const chip = e.target.closest('.chip'); if(!chip) return;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active'); curCat = chip.dataset.cat; render();
});
const q=document.getElementById('q'), clearBtn=document.getElementById('clearBtn');
q.addEventListener('input',()=>{curQ=q.value.trim().toLowerCase();clearBtn.style.display=curQ?'block':'none';render();});
clearBtn.addEventListener('click',()=>{q.value='';curQ='';clearBtn.style.display='none';render();q.focus();});

const toMapBtn=document.getElementById('toMap');
window.addEventListener('scroll',()=>{
  const b=document.querySelector('.mapwrap').getBoundingClientRect().bottom;
  toMapBtn.style.display=(b<70)?'block':'none';
},{passive:true});
toMapBtn.addEventListener('click',scrollToMap);

render();
</script>
